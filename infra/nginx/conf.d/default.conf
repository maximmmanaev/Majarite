server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 50m;

    include /etc/nginx/snippets/security-headers.conf;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "majarite-nginx-ok\n";
    }


    location = /webhooks/zammad/email {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://email-adapter:8080/webhooks/zammad/email;
    }

    location = /email-adapter/health {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://email-adapter:8080/health;
    }


    location = /webhooks/telegram {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://telegram-adapter:8080/webhooks/telegram;
    }

    location = /telegram-adapter/health {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://telegram-adapter:8080/health;
    }

    location /node-red/ {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://node-red:1880/;
    }

    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://zammad-nginx:8080;
    }
}
