name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  basic-checks:
    name: Basic repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell scripts syntax
        run: |
          find scripts -name "*.sh" -print0 | xargs -0 -r bash -n

      - name: Check JSON files
        run: |
          find . -name "*.json" -not -path "./.git/*" -print0 | xargs -0 -r -I{} python3 -m json.tool "{}" > /dev/null

      - name: Check required files
        run: |
          test -f README.md
          test -f CHANGELOG.md
          test -f Makefile
          test -f docs/index.md
          test -f docs/sprints/sprint-1-completion.md
          test -f docs/sprints/sprint-2-event-store-deploy-safety.md
          test -f env/dev/.env.example
          test -f env/prod/.env.example
          test -f scripts/deploy/smoke-test.sh
          test -f scripts/deploy/rollback.sh
          test -f scripts/backup/backup-postgres.sh
          test -f scripts/backup/restore-postgres.sh

      - name: Check runtime and secret files are not tracked
        run: |
          BAD_FILES="$(git ls-files | grep -E '(^data/|^logs/|^backups/|infra/compose/data|(^|/)\.env$|flows_cred\.json$|flows_cred[^/]*\.json$)' | grep -v 'flows_cred.example.json' || true)"
          if [ -n "$BAD_FILES" ]; then
            echo "Tracked runtime/secret files found:"
            echo "$BAD_FILES"
            exit 1
          fi

      - name: Check no latest image tags in compose/env
        run: |
          if grep -R "latest" infra/compose env --exclude-dir=.git; then
            echo "Do not use latest image tags"
            exit 1
          fi
