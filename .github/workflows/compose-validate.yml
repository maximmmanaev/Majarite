name: Compose Validate

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  compose-validate:
    name: Validate Docker Compose config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        env:
          MAJARITE_PROJECT_NAME: majarite
          MAJARITE_DATA_DIR: ./data
          MAJARITE_LOG_DIR: ./logs
        run: |
          docker compose \
            --env-file env/dev/.env.example \
            -f infra/compose/compose.base.yml \
            -f infra/compose/compose.core.yml \
            -f infra/compose/compose.prod.yml \
            config
